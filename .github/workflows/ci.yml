name: CI

# Runs the full test suite + the --check diagnostic on a matrix of
# Linux, macOS, and Windows × Python 3.10/3.11/3.12.
#
# Every step is deliberately kept as its own block with an explicit
# name so a failure surfaces at a specific step in the GitHub Actions
# summary (no "pile of commands under one step" fog). Env diagnostics
# run before and after install so future universal failures leave a
# trail the next agent can read without fetching auth-gated logs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Report environment
        # Runs before any install so we always know what we started
        # with — Python version, pip version, runner OS. If a later
        # step fails, the context is already in the log.
        run: |
          python --version
          python -m pip --version
          python -c "import sys, platform; print(sys.platform, platform.platform())"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install ASAT (verbose)
        # -v surfaces exact dependency resolution so a universal
        # install failure is diagnosable from the Actions summary.
        run: python -m pip install -v .

      - name: Install pytest
        run: python -m pip install pytest

      - name: Report installed packages
        # Post-install snapshot. Confirms sounddevice, numpy, pyttsx3
        # landed and pins the versions for reproducibility when a
        # regression appears months from now.
        run: python -m pip list

      - name: Smoke-import asat
        # Catches the "install succeeded but import broke" case
        # (e.g., missing package_data, circular import in __init__)
        # before the full test suite obscures the message.
        run: python -c "import asat; print('asat', asat.__version__, 'import ok')"

      - name: Run full test suite
        # Pin tone engine for defense in depth: macOS / Windows CI
        # runners pass the pyttsx3 backend probe but can still hit
        # flaky headless renders in `synthesize()`. Tests that
        # verify registry priority-walk behavior clear this env var
        # in their own setUp, so they're robust to the pin.
        # -v --tb=short keeps failures diagnosable in the Actions log.
        env:
          ASAT_TTS_ENGINE: tone
        run: python -m pytest -v --tb=short

      - name: Run --check diagnostic
        env:
          ASAT_TTS_ENGINE: tone
        run: python -m asat --check

      - name: Confirm --version
        run: python -m asat --version

  diagnose-audio:
    # Informational companion to the `test` matrix above: runs on a
    # single Python version across the three OSes **without** pinning
    # ``ASAT_TTS_ENGINE=tone`` and **with** ``--live``. The test matrix
    # forces the tone backend for reproducibility, which hides whether
    # pyttsx3 / sounddevice actually function on a fresh macOS or
    # Windows install. This job removes that veil: whichever TTS the
    # registry picks natively is what runs, and ``--live`` promotes a
    # MemorySink fallback from PASS to FAIL so "no sound on my Mac"
    # troubleshooting has a real signal to latch onto. Output is
    # captured per-OS and uploaded as an artifact so a blind user can
    # download and read it through their screen reader without having
    # to parse the full Actions HTML log.
    name: Audio diagnostic on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Report environment
        shell: bash
        run: |
          python --version
          python -m pip --version
          python -c "import sys, platform; print(sys.platform, platform.platform())"

      - name: Upgrade pip
        shell: bash
        run: python -m pip install --upgrade pip

      - name: Install ASAT (verbose)
        shell: bash
        run: python -m pip install -v .

      - name: Probe native TTS / audio backends
        # Reports which optional deps actually imported. Distinguishes
        # "pip install claimed success" from "the runtime bindings
        # actually load", which is a real failure mode on macOS /
        # Windows when a wheel lacks a matching system library.
        shell: bash
        continue-on-error: true
        run: |
          python - <<'PY'
          import importlib
          for mod in ("sounddevice", "numpy", "pyttsx3"):
              try:
                  m = importlib.import_module(mod)
              except Exception as exc:
                  print(f"{mod:12s} IMPORT FAILED: {type(exc).__name__}: {exc}")
              else:
                  print(f"{mod:12s} ok   ({getattr(m, '__version__', 'unknown')})")
          PY

      - name: Report installed packages
        shell: bash
        run: python -m pip list

      - name: Run --check --live (natural TTS resolution)
        # No ASAT_TTS_ENGINE override: the registry picks whatever
        # backend the platform actually ships with. --live flips step
        # 5 ("live_playback") from informational PASS to hard FAIL if
        # sounddevice / the platform live sink cannot be opened, so a
        # silent headless runner produces a diagnostic exit code
        # instead of a green checkmark. Output goes to both the log
        # and a per-OS text file uploaded below.
        shell: bash
        continue-on-error: true
        run: |
          python -m asat --check --live 2>&1 | tee "asat-check-${{ matrix.os }}.txt"

      - name: Upload diagnostic output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asat-check-${{ matrix.os }}
          path: asat-check-${{ matrix.os }}.txt
          if-no-files-found: warn
